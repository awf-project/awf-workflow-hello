name: hello
description: "Simple hello world workflow"

inputs:
  - name: name
    description: "Name to greet"
    required: false
    default: "World"

states:
  initial: greet

  greet:
    type: step
    command: echo "Hello, {{.inputs.name}}!"
    on_success: done

  done:
    type: terminal
    status: success
